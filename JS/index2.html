    <h2>Schülerwissen</h2>

    <p>Im IMP Unterricht wird den Schülern verschiedenstes beigebracht,
       beispielsweise das Vigenere-Verfahren oder der Aufbau des EAN-13.</p>

    </p>Wie man erkennt wird den Schülern verschiedenstes beigebracht,
       dabei liege  die Schwerpunkte auf den Fächern I(nformatik)-M(athematik)-P(hysik).
